version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    govet:
      enable:
        - shadow
  exclusions:
    paths:
      - cmd/iam-manager
    rules:
      - linters: [staticcheck]
        text: "SA1019"
