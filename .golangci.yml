version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    govet:
      enable:
        - shadow
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 120
    goconst:
      min-len: 2
      min-occurrences: 3
    misspell:
      locale: US
    lll:
      line-length: 120
    goimports:
      local-prefixes: github.com/rusik69/aws-iam-manager
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - mnd
        - goconst
    - path: cmd/
      linters:
        - mnd
  exclude-use-default: false