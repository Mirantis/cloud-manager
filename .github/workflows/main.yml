name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Published OCI image (not the Go module path). Requires a repo under the Mirantis org (or equivalent GHCR write access to this path).
  IMAGE_NAME: mirantis/cloud-manager

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: make deps

      - name: Run linting
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout=5m ./cmd/server/... ./internal/...
          only-new-issues: true

      - name: Run tests with coverage
        run: make test-coverage

      - name: Check test coverage
        run: |
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
            echo "Test coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 70" | bc -l) )); then
              echo "⚠️  Test coverage is below 70%"
            else
              echo "✅ Test coverage is acceptable"
            fi
          fi

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false

      - name: Build frontend
        run: make build-frontend

      - name: Validate Makefile
        run: make help

      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman

      - name: Build container image
        run: podman build -t cloud-manager:ci .

      - name: Test container image
        run: |
          podman run --rm -d -p 8080:8080 --name test-container \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            -e AWS_REGION=us-east-1 \
            cloud-manager:ci

          sleep 15

          if curl -f http://localhost:8080/ --max-time 10; then
            echo "✅ Container health check passed"
          else
            echo "❌ Container health check failed"
            podman logs test-container
            exit 1
          fi

          podman stop test-container

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push container image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          set -eux
          REG="${{ env.REGISTRY }}"
          NAME="${{ env.IMAGE_NAME }}"
          SRC="cloud-manager:ci"
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"

          podman tag "$SRC" "${REG}/${NAME}:sha-${SHORT_SHA}"
          podman push "${REG}/${NAME}:sha-${SHORT_SHA}"

          case "${{ github.ref }}" in
            refs/heads/main)
              podman tag "$SRC" "${REG}/${NAME}:latest"
              podman push "${REG}/${NAME}:latest"
              ;;
            refs/heads/develop)
              podman tag "$SRC" "${REG}/${NAME}:develop"
              podman push "${REG}/${NAME}:develop"
              ;;
          esac

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            podman tag "$SRC" "${REG}/${NAME}:${TAG}"
            podman push "${REG}/${NAME}:${TAG}"
            podman tag "$SRC" "${REG}/${NAME}:latest"
            podman push "${REG}/${NAME}:latest"
          fi

      - name: Generate deployment summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Container image (GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`:latest\` — pushes from \`main\` only" >> $GITHUB_STEP_SUMMARY
          echo "- \`:develop\` — pushes from \`develop\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`:sha-<short>\` — every non-PR build" >> $GITHUB_STEP_SUMMARY
          echo "- \`:<release-tag>\` — GitHub Release published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "podman run -d -p 8080:8080 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e AWS_ACCESS_KEY_ID=your-access-key \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e AWS_SECRET_ACCESS_KEY=your-secret-key \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e AWS_REGION=us-east-1 \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
