# Optional manual Certificate (not applied by `make deploy`). Deploy uses Ingress
# cert-manager.io/cluster-issuer annotation so one Certificate is created (no duplicates).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloud-manager-cert
  namespace: cloud-manager
  labels:
    app.kubernetes.io/name: cloud-manager
    app.kubernetes.io/component: certificate
spec:
  # Secret name where the certificate will be stored
  secretName: cloud-manager-tls
  # Certificate issuer reference
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  # List of DNS names for the certificate
  dnsNames:
  - DOMAIN_PLACEHOLDER
  # Note: DOMAIN_PLACEHOLDER is replaced at deploy time (make deploy DOMAIN=... or HOST=...)

  # Certificate renewal settings
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days before expiry

  # Key settings
  privateKey:
    algorithm: RSA
    size: 2048

  # Certificate usage
  usages:
  - digital signature
  - key encipherment