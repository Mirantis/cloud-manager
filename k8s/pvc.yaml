apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloud-manager-data
  namespace: cloud-manager
  labels:
    app.kubernetes.io/name: cloud-manager
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Omit storageClassName to use the cluster default (Mirantis / most clouds)
