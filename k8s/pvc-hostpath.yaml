# PVC bound to k8s/pv-hostpath.yaml (storageClassName cloud-manager-local).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloud-manager-data
  namespace: cloud-manager
  labels:
    app.kubernetes.io/name: cloud-manager
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: cloud-manager-local
