apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-manager
  namespace: cloud-manager
  labels:
    app.kubernetes.io/name: cloud-manager
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloud-manager
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloud-manager
        app.kubernetes.io/component: app
    spec:
      securityContext:
        fsGroup: 1000
        # hostPath PV dirs are often root-owned; ensure uid 1000 can create SQLite under /data
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      - name: data-dir-perms
        image: docker.io/library/busybox:1.36
        command: ['sh', '-c', 'mkdir -p /data && chown -R 1000:1000 /data']
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: app-data
          mountPath: /data
      containers:
      - name: cloud-manager
        image: ghcr.io/mirantis/cloud-manager:latest
        imagePullPolicy: Always
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
        volumeMounts:
        - name: app-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: cloud-manager-data